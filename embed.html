<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sofia AI Chat Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      * {
        box-sizing: border-box;
      }
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
      }
      h1, h2, h3, h4, h5, h6, .font-serif {
        font-family: 'Libre Caslon Display', Georgia, serif;
      }
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
    </style>
    <script type="module" src="/embed.tsx"></script>
  </head>
  <body class="bg-transparent">
    <div id="root" style="height: 100%; width: 100%;"></div>
